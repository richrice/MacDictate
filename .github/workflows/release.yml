name: Release

on:
  push:
    tags:
      - "v*"
  # Dry run: builds, tests, and packages, then uploads the zip as a workflow
  # artifact without publishing a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: ./scripts/bootstrap.sh

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-ci.$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: |
          xcodebuild -project MacDictate.xcodeproj -scheme MacDictate -configuration Debug \
            -derivedDataPath DerivedData -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO test

      - name: Build Release
        run: |
          xcodebuild -project MacDictate.xcodeproj -scheme MacDictate -configuration Release \
            -derivedDataPath DerivedData -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            build

      - name: Package
        run: |
          ditto -c -k --keepParent \
            "DerivedData/Build/Products/Release/MacDictate.app" \
            "MacDictate-${{ steps.version.outputs.version }}.zip"

      - name: Upload artifact (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: MacDictate-${{ steps.version.outputs.version }}
          path: MacDictate-*.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          changelog="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" -q .body)"
          printf '%s\n\n%s\n' "$(cat .github/release-notes-header.md)" "$changelog" > release-notes.md
          gh release create "$GITHUB_REF_NAME" "MacDictate-${{ steps.version.outputs.version }}.zip" \
            --title "MacDictate ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
